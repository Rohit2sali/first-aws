version: "3.9"

services:

  inference-server:
    build:
      context: .
      dockerfile: inference_server/Dockerfile

    container_name: inference-server

    ports:
      - "9000:9000"

    env_file:
      - .env

    volumes:
      - ~/.aws:/root/.aws

    restart: unless-stopped


  chatbot-backend:
    build:
      context: .
      dockerfile: app/Dockerfile

    container_name: chatbot-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - inference-server

    restart: unless-stopped
