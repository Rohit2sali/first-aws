<!DOCTYPE html>
<html>

<head>
    <title>AI Chatbot</title>

    <style>

        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        #chat-box {
            background: white;
            height: 400px;
            overflow-y: scroll;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }

    </style>
</head>

<body>

    <h1>AI Chatbot</h1>

    <div id="chat-box"></div>

    <input type="text" id="prompt" placeholder="Type your message..." />

    <button onclick="sendMessage()">
        Send
    </button>

    <script>

        async function sendMessage() {

            const promptInput = document.getElementById("prompt");

            const prompt = promptInput.value;

            const chatBox = document.getElementById("chat-box");

            chatBox.innerHTML += `
                <div class="message user">
                    <b>You:</b> ${prompt}
                </div>
            `;

            promptInput.value = "";

            const response = await fetch("/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    prompt: prompt
                })
            });

            const data = await response.json();

            chatBox.innerHTML += `
                <div class="message bot">
                    <b>Bot:</b> ${data.response}
                </div>
            `;

            chatBox.scrollTop = chatBox.scrollHeight;
        }

    </script>

</body>

</html>
